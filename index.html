    setGenerating(true);
    const html=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#fdf9f3;font-family:'DM Sans','PingFang SC',sans-serif;color:#2c3e2d}.page{width:794px;margin:0 auto;background:#fff;padding:0}.cover{background:linear-gradient(160deg,#eef6f0,#fef9f0,#e8f4f8);padding:60px 48px 40px;position:relative;overflow:hidden}.cover::after{content:"🌿";position:absolute;right:40px;top:30px;font-size:120px;opacity:0.08}.cov-tag{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#6b8c6e;margin-bottom:16px}.cov-title{font-family:'Lora',serif;font-size:36px;font-weight:600;color:#2c3e2d;line-height:1.3;margin-bottom:8px}.cov-sub{font-size:14px;color:#6b8c6e;margin-bottom:32px}.cov-date{display:inline-block;padding:8px 20px;background:#4a7c59;color:#fff;border-radius:20px;font-size:13px;font-weight:600}.body{padding:40px 48px}.sec{margin-bottom:32px}.sec-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:#4a7c59;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #eef6f0}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.sc{background:#f8fbf6;border:1px solid #ddeedd;border-radius:12px;padding:14px;text-align:center}.sn{font-family:'Lora',serif;font-size:28px;font-weight:600;line-height:1.2}.sl{font-size:11px;color:#6b8c6e;margin-top:4px}.hr{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f7ec}.dots{display:flex;gap:4px}.dot{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}.sr{display:flex;align-items:center;gap:12px;margin-bottom:10px}.sl2{width:80px;font-size:12px;color:#6b8c6e;flex-shrink:0}.sbw{flex:1}.ti{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8fbf6;border-radius:10px;margin-bottom:6px}.tp{flex:1;height:6px;background:#e8f0e4;border-radius:3px;overflow:hidden}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="page"><div class="cover"><div class="cov-tag">生长日记 · 周报</div><div class="cov-title">这一周，<br/>你认真生活了。</div><div class="cov-sub">记录每一天的努力，见证自己的成长</div><div class="cov-date">${fd(ws)} — ${fd(we)}</div></div><div class="body"><div class="sec"><div class="sec-title">🌟 本周概览</div><div class="g3"><div class="sc"><div class="sn" style="color:#4a7c59">${avgHabitPct}%</div><div class="sl">习惯完成率</div></div><div class="sc"><div class="sn" style="color:#5b8fa8">${totalEx}</div><div class="sl">运动分钟</div></div><div class="sc"><div class="sn" style="color:#d4860a">${totalSun}</div><div class="sl">晒太阳分钟</div></div></div><div class="g3"><div class="sc"><div class="sn" style="color:${sc(avgMeal)}">${avgMeal||"—"}</div><div class="sl">饮食平均分</div></div><div class="sc"><div class="sn" style="color:#7a5a9a">${avgSleepDur||"—"}</div><div class="sl">平均睡眠(h)</div></div><div class="sc"><div class="sn" style="color:${avgScreen>240?"#c4614a":avgScreen>120?"#d4860a":"#4a7c59"}">${avgScreen||"—"}</div><div class="sl">日均屏幕(分钟)</div></div></div></div>${habitRows.length>0?`<div class="sec"><div class="sec-title">🌱 习惯打卡（正向）</div>${habitRows.map(({h,counts,days,pct})=>`<div class="hr"><span style="font-size:18px;flex-shrink:0">${h.emoji}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;margin-bottom:4px">${h.title}</div><div class="dots">${counts.map(c=>`<div class="dot" style="background:${c>0?"#b8d8c0":"#f0f7ec"};color:${c>0?"#2a6040":"#a8c0a8"}">${c>0?c:"·"}</div>`).join("")}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:700;color:#4a7c59">${pct}%</div><div style="font-size:10px;color:#a8c0a8">${days}/7天</div></div></div>`).join("")}</div>`:""}${weekMeals.length>0?`<div class="sec"><div class="sec-title">🍽 饮食健康</div><div style="background:#fdf0ee;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center"><div style="font-size:11px;color:#c4614a;margin-bottom:4px">本周平均总分</div><div style="font-family:'Lora',serif;font-size:48px;font-weight:600;color:${sc(avgMeal)}">${avgMeal}</div><div style="font-size:12px;color:#a8c0a8">共记录 ${weekMeals.length} 餐</div></div><div class="sr"><div class="sl2">糖分控制</div><div class="sbw">${bar(avgSugar*10,sc(avgSugar))}</div><div style="font-size:13px;font-weight:600;color:${sc(avgSugar)};width:30px;text-align:right">${avgSugar}</div></div><div class="sr"><div class="sl2">盐分控制</div><div class="sbw">${bar(avgSalt*10,sc(avgSalt))}</div><div style="font-size:13px;font-weight:600;color:${sc(avgSalt)};width:30px;text-align:right">${avgSalt}</div></div><div class="sr"><div class="sl2">皮肤友好</div><div class="sbw">${bar(avgSkin*10,sc(avgSkin))}</div><div style="font-size:13px;font-weight:600;color:${sc(avgSkin)};width:30px;text-align:right">${avgSkin}</div></div><div class="sr"><div class="sl2">营养均衡</div><div class="sbw">${bar(avgNutrition*10,sc(avgNutrition))}</div><div style="font-size:13px;font-weight:600;color:${sc(avgNutrition)};width:30px;text-align:right">${avgNutrition}</div></div></div>`:""}${tasks.length>0?`<div class="sec"><div class="sec-title">📚 任务进度</div>${tasks.slice(0,8).map(t=>{const tp=TASK_TYPES.find(x=>x.id===t.type)||TASK_TYPES[0];const pct=Math.round(t.current/t.total*100);return`<div class="ti"><span style="font-size:16px">${tp.icon}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</div><div class="tp"><div style="width:${pct}%;height:100%;background:${tp.color};border-radius:3px"></div></div></div><div style="font-size:13px;font-weight:700;color:${tp.color};flex-shrink:0;margin-left:8px">${pct}%</div></div>`}).join("")}</div>`:""}${weekSleep.length>0?`<div class="sec"><div class="sec-title">🌙 睡眠记录</div><div class="g2"><div class="sc" style="background:#f0ecf8"><div class="sn" style="color:#7a5a9a">${avgSleepDur}h</div><div class="sl">平均睡眠时长</div></div><div class="sc" style="background:#f0ecf8"><div class="sn" style="color:${sc(avgSleepQ)}">${avgSleepQ}</div><div class="sl">平均睡眠质量</div></div></div></div>`:""}${weekEx.length>0?`<div class="sec"><div class="sec-title">🏃 运动记录</div><div class="g3"><div class="sc" style="background:#e8f4f8"><div class="sn" style="color:#5b8fa8">${totalEx}</div><div class="sl">运动总分钟</div></div><div class="sc" style="background:#e8f4f8"><div class="sn" style="color:#5b8fa8">${exDays}</div><div class="sl">运动天数</div></div><div class="sc" style="background:#e8f4f8"><div class="sn" style="color:#5b8fa8">${exDays>0?Math.round(totalEx/exDays):0}</div><div class="sl">平均每次(分钟)</div></div></div></div>`:""}
<div style="text-align:center;padding:24px 0 8px;border-top:1px solid #e8f0e4"><div style="font-family:'Lora',serif;font-size:13px;color:#6b8c6e;font-style:italic">「在严冬，我终于知道，我身上有一个不可战胜的夏天。」</div><div style="font-size:11px;color:#a8c0a8;margin-top:4px">—— 加缪 · 生长日记</div></div></div></div></body></html>`;

    const win=window.open("","_blank");
    win.document.write(html);
    win.document.close();
    setTimeout(()=>{win.focus();win.print();setGenerating(false)},800);
  };

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#eef6f0,#fef9f0)",border:"1px solid var(--border)",borderRadius:20,padding:"24px",marginBottom:16,textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:20,top:10,fontSize:60,opacity:0.08}}>📋</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
          <button onClick={()=>setOffset(-1)} style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${offset===-1?"var(--green)":"var(--border)"}`,background:offset===-1?"var(--gl)":"#fff",color:offset===-1?"var(--green)":"var(--sub)",fontSize:12,fontWeight:600,cursor:"pointer"}}>上周</button>
          <div style={{fontFamily:"Lora,serif",fontSize:20,fontWeight:600,color:"var(--green)"}}>周报</div>
          <button onClick={()=>setOffset(0)} style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${offset===0?"var(--green)":"var(--border)"}`,background:offset===0?"var(--gl)":"#fff",color:offset===0?"var(--green)":"var(--sub)",fontSize:12,fontWeight:600,cursor:"pointer"}}>本周</button>
        </div>
        <div style={{fontSize:13,color:"var(--sub)",marginBottom:16}}>{fd(ws)} — {fd(we)}</div>
        <button onClick={generatePDF} disabled={generating} style={{padding:"13px 32px",background:generating?"var(--muted)":"var(--green)",border:"none",borderRadius:14,color:"#fff",fontWeight:600,fontSize:15,cursor:generating?"not-allowed":"pointer",boxShadow:"0 4px 16px rgba(74,124,89,0.25)"}}>
          {generating?"⏳ 生成中…":"📄 生成周报 PDF"}
        </button>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:10}}>弹出打印窗口后，选择「存储为PDF」保存</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div className="card" style={{textAlign:"center",background:"var(--gl)"}}><div style={{fontSize:26,fontWeight:700,color:"var(--green)",fontFamily:"Lora,serif"}}>{avgHabitPct}%</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>习惯完成率</div></div>
        <div className="card" style={{textAlign:"center",background:"var(--bl)"}}><div style={{fontSize:26,fontWeight:700,color:"var(--blue)",fontFamily:"Lora,serif"}}>{totalEx}</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>运动分钟</div></div>
        <div className="card" style={{textAlign:"center",background:"var(--al)"}}><div style={{fontSize:26,fontWeight:700,color:"var(--amber)",fontFamily:"Lora,serif"}}>{totalSun}</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>晒太阳分钟</div></div>
        <div className="card" style={{textAlign:"center",background:"var(--rl)"}}><div style={{fontSize:26,fontWeight:700,color:"var(--rose)",fontFamily:"Lora,serif"}}>{avgMeal||"—"}</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>饮食平均分</div></div>
        <div className="card" style={{textAlign:"center",background:"var(--pl)"}}><div style={{fontSize:26,fontWeight:700,color:"var(--purple)",fontFamily:"Lora,serif"}}>{avgSleepDur||"—"}</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>平均睡眠(h)</div></div>
        <div className="card" style={{textAlign:"center",background:"#f4f0f8"}}><div style={{fontSize:26,fontWeight:700,color:"#7a6aa0",fontFamily:"Lora,serif"}}>{avgScreen||"—"}</div><div style={{fontSize:11,color:"var(--sub)",marginTop:4}}>日均屏幕(分钟)</div></div>
      </div>

      <div style={{padding:14,background:"var(--gl)",border:"1px solid var(--gm)",borderRadius:12,fontSize:12,color:"var(--sub)",lineHeight:1.7}}>
        💡 建议每周日生成一份留存，作为数据备份和自我成长记录。
      </div>
    </div>
  );
}

// ══════════════════ EMPTY STATE ══════════════════
function Empty({icon,text}){
  return (
    <div style={{textAlign:"center",padding:"48px 0",color:"var(--muted)"}}>
      <div style={{fontSize:40,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:14}}>{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
